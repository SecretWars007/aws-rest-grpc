apiVersion: apps/v1
kind: Deployment
metadata:
  name: yape-frontend
  namespace: yape-app
  labels:
    app: yape-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: yape-frontend
  template:
    metadata:
      labels:
        app: yape-frontend
    spec:
      containers:
      - name: yape-frontend
        image: aws-rest-grpc-yape-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: yape-frontend
  namespace: yape-app
  labels:
    app: yape-frontend
spec:
  type: NodePort
  selector:
    app: yape-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 32002
    name: http
