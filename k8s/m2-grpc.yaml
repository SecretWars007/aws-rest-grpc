apiVersion: apps/v1
kind: Deployment
metadata:
  name: m2-grpc
  namespace: yape-app
  labels:
    app: m2-grpc
    app.kubernetes.io/name: yape-m2-grpc
    app.kubernetes.io/part-of: yape-system
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: m2-grpc
  template:
    metadata:
      labels:
        app: m2-grpc
    spec:
      containers:
        - name: m2-grpc
          image: aws-rest-grpc-m2-grpc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            # gRPC does not support default HTTP probe easily, but we can configure a basic tcp socket check
            tcpSocket:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: m2-grpc
  namespace: yape-app
  labels:
    app: m2-grpc
spec:
  type: ClusterIP
  selector:
    app: m2-grpc
  ports:
    - port: 50051
      targetPort: 50051
      protocol: TCP
      name: grpc
